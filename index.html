<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel 監視コントロール</title>
    <!-- モダンなフォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ダークモード＆グラスモーフィズムのカラーパレット */
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            
            /* ステータスカラー */
            --color-stopped: #64748b;
            --color-monitoring: #10b981;
            --color-alerting: #ef4444;
            --color-muted: #f59e0b;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            overflow: hidden;
        }

        /* 背景の装飾的な光の玉 */
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: pulse-light 8s infinite alternate;
        }
        .light-1 {
            top: -10%; left: -10%;
            width: 400px; height: 400px;
            background: rgba(56, 189, 248, 0.3);
        }
        .light-2 {
            bottom: -20%; right: -10%;
            width: 500px; height: 500px;
            background: rgba(139, 92, 246, 0.2);
        }

        @keyframes pulse-light {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0.5; }
        }

        /* メインのガラスカード */
        .glass-card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 420px;
            padding: 40px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 状態表示エリア */
        .status-container {
            margin-bottom: 40px;
        }

        .status-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-icon {
            font-size: 3.5rem;
            line-height: 1;
            z-index: 2;
        }

        /* 状態ごとの波紋エフェクト */
        .ripple {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid transparent;
            opacity: 0;
        }

        .status-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 5px;
            transition: color 0.3s ease;
        }

        .status-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin: 0;
            min-height: 1.2rem;
        }

        /* 特定のステータスのスタイル */
        /* 1. 停止中 */
        .state-stopped .status-icon-wrapper {
            box-shadow: 0 0 20px rgba(100, 116, 139, 0.3);
            border: 2px solid var(--color-stopped);
        }
        .state-stopped .status-text { color: var(--color-stopped); }

        /* 2. 監視中 */
        .state-monitoring .status-icon-wrapper {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
            border: 2px solid var(--color-monitoring);
        }
        .state-monitoring .ripple {
            border-color: var(--color-monitoring);
            animation: ripple-anim 2.5s infinite linear;
        }
        .state-monitoring .status-text { color: var(--color-monitoring); }

        /* 3. 警報発報中 */
        .state-alerting .status-icon-wrapper {
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4);
            border: 2px solid var(--color-alerting);
            animation: shake 0.5s infinite alternate;
        }
        .state-alerting .ripple {
            border-color: var(--color-alerting);
            animation: ripple-anim 1s infinite linear;
        }
        .state-alerting .status-text { color: var(--color-alerting); }

        /* ミュート操作エリア（警報中のみ表示） */
        .mute-panel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            height: 0;
            overflow: hidden;
        }

        /* クラス付与でスッと出現 */
        .mute-panel.visible {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
            height: auto;
            overflow: visible;
        }

        .mute-title {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f8fafc;
        }

        .mute-warning {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 15px;
            line-height: 1.4;
        }

        /* プレミアムなトグルスイッチ */
        .toggle-wrapper {
            position: relative;
            display: inline-block;
            width: 74px;
            height: 38px;
        }

        .toggle-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: .4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 38px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "🔔";
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            height: 28px;
            width: 28px;
            left: 4px;
            bottom: 4px;
            background-color: var(--text-main);
            transition: .4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* ミュート状態（ON）のスタイル */
        input:checked + .toggle-slider {
            background-color: rgba(245, 158, 11, 0.2);
            border-color: var(--color-muted);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(36px);
            content: "🔇";
        }
        
        input:disabled + .toggle-slider {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 通信状態インジケーター */
        .connection-status {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            font-size: 0.75rem;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--color-stopped);
        }
        .status-dot.active {
            background-color: var(--color-monitoring);
            box-shadow: 0 0 8px var(--color-monitoring);
        }

        /* アニメーション定義 */
        @keyframes ripple-anim {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(-1deg); }
        }

        /* ローディングスケルトン的表示 */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <!-- 背景の光 -->
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="glass-card" id="main-card">
        <div class="header">
            <h1>Sentinel Remote</h1>
        </div>

        <!-- 状態表示エリア -->
        <div class="status-container" id="status-container">
            <div class="status-icon-wrapper">
                <div class="ripple"></div>
                <div class="status-icon" id="status-icon">🔄</div>
            </div>
            <h2 class="status-text" id="status-text">Connecting...</h2>
            <p class="status-desc" id="status-desc">システムへ接続しています</p>
        </div>

        <!-- ミュートパネル（警報中のみ表示される） -->
        <div class="mute-panel" id="mute-panel">
            <span class="mute-title" id="mute-title">通知と画像転送の制御</span>
            
            <label class="toggle-wrapper" title="クリックでミュートを切り替え">
                <input type="checkbox" id="mute-toggle" disabled>
                <span class="toggle-slider"></span>
            </label>

            <span class="mute-warning">ミュートをONにすると、現在発生中の画像保存とChatへのメッセージ転送が一時停止されます。</span>
        </div>

    </div>

    <!-- 通信状態 -->
    <div class="connection-status">
        <div class="status-dot" id="conn-dot"></div>
        <span id="conn-text">Connecting to Firebase...</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
